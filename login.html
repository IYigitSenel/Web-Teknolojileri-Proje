<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Yiğit Şenel</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg border-0" style="max-width: 400px; width: 100%;">
            <div class="card-header bg-dark text-white text-center py-3">
                <h4 class="mb-0">Öğrenci Girişi</h4>
            </div>
            <div class="card-body p-4 bg-white">
                <!-- Form, php klasörü altındaki login.php'ye gider -->
                <form action="php/login.php" method="POST" onsubmit="return validateForm()">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">E-posta</label>
                        <input type="text" name="email" id="email" class="form-control" placeholder="b2412100001@sakarya.edu.tr">
                        <div id="emailHelp" class="form-text text-muted small">Öğrenci mail adresinizi giriniz.</div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold">Şifre</label>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Öğrenci Numaranız">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Giriş Yap</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="index.html" class="text-decoration-none text-secondary small">← Ana Sayfaya Dön</a>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Kontrolü -->
    <script>
    function validateForm() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        
        // Mail formatı kontrolü (regex)
        const emailRegex = /^[a-zA-Z0-9._%+-]+@sakarya\.edu\.tr$/;

        if (email === "" || password === "") {
            alert("Hata: Lütfen tüm alanları doldurunuz!");
            return false;
        }

        if (!emailRegex.test(email)) {
            alert("Hata: Lütfen geçerli bir @sakarya.edu.tr mail adresi giriniz!");
            return false;
        }

        return true;
    }
    </script>

</body>
</html>
